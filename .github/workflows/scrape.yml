name: Multi-Dealer Laptop Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  scrape-cloud:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install
      - run: npx puppeteer browsers install chrome

      - run: npm start
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          MBW_PROXY_HOST: ${{ secrets.MBW_PROXY_HOST }}
          SCRAPE_DEALERS: MBW,FPT,CPS
