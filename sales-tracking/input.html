<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSI Vietnam — Target Tracking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ==========================================================
   MSI Vietnam — Target Tracking  ·  v3 "Blotter"
   Rules: no shadow. no radius. no badge. no chart library.
   Colour is data, never decoration. Hairlines only.
   ========================================================== */
:root{
  --paper:#FDFDFC;          /* warm near-white — paper, not screen grey */
  --panel:#FFFFFF;
  --ink:#292A2F;            /* softened from near-black: still 12:1 on paper */
  --ink-2:#6C6E76;
  --ink-3:#95979E;          /* column heads live here — not lightened further */
  --ink-4:#C8C9CD;
  --rule:#F0F0EC;           /* hairline */
  --rule-2:#E2E2DD;         /* structural rule */
  --hover:#F8F8F5;
  --sel:#FDF5F4;
  --bar:#CBCDD3;            /* pace fill — was --ink-2, the darkest mass on the page */

  --msi:#E0292A;            /* the only accent. used sparingly. */
  --pos:#0B7A4C;
  --warn:#A96A00;
  --neg:#C42A20;

  /* data hues — kept identical to the other dashboard tabs */
  --gaming:#DC2626; --bp:#1D4ED8; --handheld:#7C3AED; --others:#6B7080;
  --dgw:#C2560F; --vsc:#1E3A8A; --spc:#7A3A0B;

  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --display:'Archivo','Inter',sans-serif;
  --pad:22px;
}
[data-theme="dark"]{
  --paper:#0C0D10; --panel:#111216;
  --ink:#ECEDF0; --ink-2:#9598A2; --ink-3:#666975; --ink-4:#43454E;
  --rule:#212329; --rule-2:#31343C; --hover:#181A1F; --sel:#2A1211; --bar:#3C3F48;
  --pos:#3FBE85; --warn:#D9A03C; --neg:#F0685C; --others:#9598A2;
  --dgw:#E8853F; --vsc:#6B8FD4; --spc:#B87A45;
}
*{box-sizing:border-box;}
html,body{margin:0; padding:0;}
body{
  background:var(--paper); color:var(--ink);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:13px; font-variant-numeric:tabular-nums;
  -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
:focus-visible{outline:1.5px solid var(--msi); outline-offset:1px;}
.n{font-variant-numeric:tabular-nums; text-align:right; white-space:nowrap;}
.m{font-family:var(--mono); font-variant-numeric:tabular-nums;}

/* ---------- masthead ---------- */
.masthead{
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  padding:0 var(--pad); height:52px; border-bottom:1px solid var(--rule);
  position:sticky; top:0; z-index:30; background:var(--paper);
}
.mh-left{display:flex; align-items:center; gap:13px; min-width:0;}
.mh-left img{width:22px; height:22px; object-fit:contain;}
.mh-title{
  font-family:var(--display); font-weight:600; font-size:12px; color:var(--ink);
  text-transform:uppercase; letter-spacing:.17em; white-space:nowrap;
}
.mh-rule{width:1px; height:15px; background:var(--rule-2); flex:0 0 auto;}
.mh-period{
  font-family:var(--mono); font-size:12px; font-weight:500; color:var(--ink-2);
  letter-spacing:.02em; white-space:nowrap;
}
.mh-week{font-family:var(--mono); font-size:11px; color:var(--ink-3); white-space:nowrap;}
.mh-right{display:flex; align-items:center; gap:13px; flex:0 0 auto;}
.stamp{
  font-family:var(--mono); font-size:10.5px; color:var(--ink-3);
  display:flex; align-items:center; gap:6px; white-space:nowrap;
}
.stamp::before{content:''; width:4px; height:4px; background:var(--pos); flex:0 0 auto;}
.stamp.stale{color:var(--warn);} .stamp.stale::before{background:var(--warn);}
.mh-btn{
  font-size:11px; font-weight:600; color:var(--ink-2); letter-spacing:.04em;
  text-transform:uppercase; padding:4px 0; border-bottom:1px solid transparent;
}
.mh-btn:hover{color:var(--msi); border-bottom-color:var(--msi);}
.mh-btn.busy{opacity:.4; pointer-events:none;}

/* ---------- filter strip ---------- */
.strip{
  display:flex; align-items:center; gap:0; padding:0 var(--pad);
  border-bottom:1px solid var(--rule); min-height:38px; flex-wrap:wrap;
  position:sticky; top:52px; z-index:29; background:var(--paper);
}
.strip-group{display:flex; align-items:center; gap:0;}
.strip-sep{width:1px; height:14px; background:var(--rule); margin:0 12px; flex:0 0 auto;}
.sel{position:relative;}
.sel-btn{
  display:flex; align-items:baseline; gap:6px; padding:8px 10px; font-size:11.5px; white-space:nowrap;
}
.sel-btn .k{color:var(--ink-2); font-weight:500; font-size:10px; text-transform:uppercase; letter-spacing:.08em;}
.sel-btn .v{color:var(--ink); font-weight:600; max-width:130px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.sel-btn:hover .v{color:var(--msi);}
.sel-btn.on .v{color:var(--msi);}
.sel-btn.on::after{content:''; position:absolute; left:10px; right:10px; bottom:0; height:1px; background:var(--msi);}
.sel-panel{
  position:absolute; top:100%; left:0; min-width:214px; z-index:60; display:none;
  background:var(--panel); border:1px solid var(--rule-2); padding:6px;
}
.sel-panel.open{display:block;}
.sel-search{
  width:100%; padding:5px 7px; border:1px solid var(--rule); background:var(--paper);
  color:var(--ink); font-size:11.5px; font-family:inherit; margin-bottom:5px;
}
.sel-search:focus{outline:none; border-color:var(--ink-3);}
.sel-list{max-height:236px; overflow-y:auto;}
.sel-list::-webkit-scrollbar{width:8px;}
.sel-list::-webkit-scrollbar-thumb{background:var(--rule-2);}
.sel-opt{
  display:flex; align-items:center; gap:7px; padding:4px 6px; font-size:12px; cursor:pointer; color:var(--ink-2);
}
.sel-opt:hover{background:var(--hover); color:var(--ink);}
.sel-opt input{margin:0; accent-color:var(--msi); width:12px; height:12px;}
.sel-all{border-bottom:1px solid var(--rule); margin-bottom:4px; padding-bottom:5px; font-weight:700; color:var(--ink);}
.sel-none{font-size:11.5px; color:var(--ink-3); padding:5px 6px;}
.strip-clear{margin-left:auto; font-size:10.5px; font-weight:600; color:var(--ink-3); text-transform:uppercase; letter-spacing:.08em; padding:8px 0;}
.strip-clear:hover{color:var(--msi);}

/* ---------- KPI rail ---------- */
.rail{
  display:flex; align-items:stretch; border-bottom:1px solid var(--rule);
  padding:0 var(--pad); overflow-x:auto;
}
.rail::-webkit-scrollbar{height:0;}
.kpi{padding:17px 22px 17px 0; margin-right:22px; border-right:1px solid var(--rule); flex:0 0 auto; min-width:96px;}
.kpi:first-child{padding-left:0;}
.kpi:last-child{border-right:none; margin-right:0;}
.kpi-k{
  font-size:9px; font-weight:700; color:var(--ink-2); text-transform:uppercase;
  letter-spacing:.12em; margin-bottom:6px; white-space:nowrap;
}
.kpi-v{font-family:var(--mono); font-size:22px; font-weight:500; letter-spacing:-.6px; line-height:1; white-space:nowrap;}
.kpi-v.lead{font-size:30px; font-weight:500; letter-spacing:-1.2px;}
.kpi-v.neg{color:var(--neg);} .kpi-v.pos{color:var(--pos);} .kpi-v.warn{color:var(--warn);}
.kpi-s{font-size:10px; color:var(--ink-3); margin-top:5px; white-space:nowrap;}
.kpi-s .m{font-size:10px; color:var(--ink-2);}
.rail-gauges{display:flex; gap:18px; align-items:center; padding:11px 0 11px 0; margin-left:auto; flex:0 0 auto;}
.gz{display:flex; flex-direction:column; align-items:center; gap:4px;}
.gz-k{font-size:8.5px; font-weight:700; color:var(--ink-2); text-transform:uppercase; letter-spacing:.11em;}

/* ---------- notice ---------- */
.notice{
  display:flex; align-items:flex-start; gap:9px; padding:9px var(--pad);
  border-bottom:1px solid var(--rule); background:var(--sel);
  font-size:11.5px; color:var(--ink-2); line-height:1.5;
}
.notice::before{content:''; width:2px; align-self:stretch; background:var(--msi); flex:0 0 auto;}
.notice b{color:var(--ink); font-family:var(--mono); font-weight:600;}
.notice:empty{display:none;}

/* ---------- meta bar ---------- */
.meta{
  padding:6px var(--pad); border-bottom:1px solid var(--rule);
  font-family:var(--mono); font-size:10px; color:var(--ink-3); letter-spacing:.02em;
}

/* ---------- THE BLOTTER ---------- */
.sheet{overflow-x:auto; padding-bottom:40px;}
.sheet::-webkit-scrollbar{height:9px;}
.sheet::-webkit-scrollbar-thumb{background:var(--rule-2);}
table{width:100%; border-collapse:collapse; min-width:1080px;}
/* No sticky. `.sheet` has overflow-x:auto, which per spec forces overflow-y to auto
   as well — that makes .sheet the sticky container, not the viewport, and pins the
   header 90px INTO the table on top of a data row. Each section carries its own
   column header instead: no magic offset, nothing to get wrong. */
tr.cols th{
  background:var(--paper);
  font-size:9.5px; font-weight:700; color:var(--ink-2); text-transform:uppercase; letter-spacing:.1em;
  padding:7px 11px; text-align:left; white-space:nowrap; border-bottom:1px solid var(--rule-2);
  cursor:pointer; user-select:none;
}
tr.cols th:first-child{padding-left:var(--pad);}
tr.cols th:last-child{padding-right:var(--pad);}
tr.cols th.n{text-align:right;}
tr.cols th:hover{color:var(--ink);}
tr.cols th.on{color:var(--msi);}
tr.cols th .ar{font-family:var(--mono); font-weight:400;}
tr.cols:hover{background:transparent;}
tbody td{
  padding:0 11px; height:34px; border-bottom:1px solid var(--rule);
  white-space:nowrap; font-size:12.5px; color:var(--ink);
}
tbody td:first-child{padding-left:var(--pad);}
tbody td:last-child{padding-right:var(--pad);}
tbody tr{cursor:pointer;}
tbody tr:hover{background:var(--hover);}
tbody tr.on{background:var(--sel); box-shadow:inset 2px 0 0 var(--msi);}
td.name{font-weight:500; max-width:216px; overflow:hidden; text-overflow:ellipsis;}
td.num{font-family:var(--mono); font-weight:400; font-size:12px; color:var(--ink-2);}
td.num.hi{color:var(--ink); font-weight:500;}
td.muted{color:var(--ink-4);}

/* colour the digits — never a pill */
.v-pos{color:var(--pos); font-weight:500;}
.v-neg{color:var(--neg); font-weight:500;}
.v-warn{color:var(--warn); font-weight:500;}
.v-off{color:var(--ink-4);}
.swatch{display:inline-block; width:6px; height:6px; margin-right:8px; vertical-align:1px;}
.idle{color:var(--ink-4); font-size:11px; letter-spacing:.04em;}

/* section band — one ledger, four movements */
tr.sec td{
  height:auto; padding:26px var(--pad) 6px; border-bottom:none;
  font-family:var(--display); font-size:10.5px; font-weight:700; color:var(--ink);
  text-transform:uppercase; letter-spacing:.15em;
}
tbody:first-child tr.sec td{padding-top:12px;}
tr.sec .cnt{
  font-family:var(--mono); font-size:10px; font-weight:400; color:var(--ink-3);
  letter-spacing:.02em; text-transform:none; margin-left:10px;
}
tr.sec .sel-note{color:var(--msi); font-weight:600; letter-spacing:.02em; text-transform:none; font-size:10px; margin-left:8px;}
tr.sub td{
  height:30px; border-top:1px solid var(--rule-2); border-bottom:none;
  font-size:11.5px; font-weight:600; color:var(--ink-2); background:var(--paper);
}
tr.sub td:first-child{padding-left:var(--pad); font-size:9.5px; text-transform:uppercase; letter-spacing:.09em; color:var(--ink-3);}
tr.sub td.num{font-family:var(--mono); color:var(--ink);}
tr.sec:hover, tr.sub:hover{background:transparent;}

.empty{padding:52px var(--pad); color:var(--ink-3); font-size:12.5px;}
.toast{
  position:fixed; bottom:0; left:0; right:0; background:var(--ink); color:var(--paper);
  padding:11px var(--pad); font-size:12px; z-index:100; display:none;
  border-top:2px solid var(--msi);
}

@media (max-width:820px){
  :root{--pad:13px;}
  .masthead{height:auto; padding-top:9px; padding-bottom:9px; flex-wrap:wrap;}
  .strip{position:static;}
  .rail-gauges{margin-left:0;}
}
@media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important;}}
@media print{
  .strip,.dims-note,.mh-right{display:none;}
  body{background:#fff;} .sheet{overflow:visible;}
}
</style>

    </div>
  </div>
  <div class="strip-sep"></div>
  <div class="strip-group">
    <div class="sel" id="selSalesRep">
      <button class="sel-btn"><span class="k">Rep</span><span class="v">All</span></button>
      <div class="sel-panel"><input class="sel-search" placeholder="Search"><div class="sel-list"></div></div>
    </div>
    <div class="sel" id="selChannel">
      <button class="sel-btn"><span class="k">Channel</span><span class="v">All</span></button>
      <div class="sel-panel"><input class="sel-search" placeholder="Search"><div class="sel-list"></div></div>
    </div>
    <div class="sel" id="selSeries">
      <button class="sel-btn"><span class="k">Series</span><span class="v">All</span></button>
      <div class="sel-panel"><input class="sel-search" placeholder="Search"><div class="sel-list"></div></div>
    </div>
    <div class="sel" id="selCustomer">
      <button class="sel-btn"><span class="k">Customer</span><span class="v">All</span></button>
      <div class="sel-panel"><input class="sel-search" placeholder="Search"><div class="sel-list"></div></div>
    </div>
  </div>
  <button class="strip-clear" id="btnClear">Reset</button>
</div>

<div class="rail" id="rail"></div>

<div class="notice" id="notice"></div>

<div class="meta" id="meta"></div>

<div class="sheet">
  <table id="ledger"></table>
</div>

<div class="toast" id="toast"></div>
<script>
const API_BASE = 'https://script.google.com/macros/s/AKfycbxti4DHFkii-KBvBFkUal0Qy0wDQVX_v6HCiIl_-4lGrrZRinRQRVeNHRb11FBJz_Nc9Q/exec';
const $ = id => document.getElementById(id);

/* ---------- format ---------- */
const num = v => { const n = parseFloat(v); return isNaN(n) ? null : n; };
const numOr0 = v => { const n = num(v); return n === null ? 0 : n; };
const isActiveRow = v => String(v).toLowerCase() === 'true';
const blank = v => (v === null || v === undefined || v === 0);
const fmtInt = v => blank(v) ? '' : Math.round(v).toLocaleString('en-US');
const fmtPct = v => blank(v) ? '' : v.toFixed(1);
const fmtWoi = v => blank(v) ? '' : v.toFixed(1);
const idle = () => '<span class="idle">·</span>';
const cssVar = k => getComputedStyle(document.documentElement).getPropertyValue(k).trim();
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
function seriesLabel(s){ if(!s) return 'Other'; if(s.indexOf('Business') === 0) return 'Business & Productivity'; return s; }
function seriesColorVar(s){ if(s === 'Gaming') return '--gaming'; if(s && s.indexOf('Business') === 0) return '--bp'; if(s === 'Handheld') return '--handheld'; return '--others'; }

/* colour the digits, never wrap them in a pill */
function achCls(p){ if(p === null) return 'v-off'; if(p >= 85) return 'v-pos'; if(p >= 70) return 'v-warn'; return 'v-neg'; }
function woiCls(w){ if(w === null) return 'v-off'; if(w > 20) return 'v-neg'; if(w > 12) return 'v-warn'; return ''; }
function signCls(v){ if(v === null) return 'v-off'; return v > 0 ? 'v-pos' : 'v-neg'; }

/* ---------- state ---------- */
const QW = 13;
const DEFAULTS = { year:null, quarter:null };
let periodLocked = false, periodTouched = false;
let fullData = [];
const filters = { year:new Set(), quarter:new Set(), salesRep:new Set(), channel:new Set(), series:new Set(), customer:new Set() };
const sort = { f:'actual', d:'desc' };

/* ---------- period ---------- */
function currentPeriod(){ const d = new Date(); return { year:'Y'+d.getFullYear(), quarter:'Q'+(Math.floor(d.getMonth()/3)+1) }; }
function initDefaultPeriod(fromNetwork){
  if(periodLocked || periodTouched || !fullData.length) return;
  const combos = new Set(fullData.map(r => r.year_label+'|'+r.quarter_label));
  const cur = currentPeriod();
  let y = cur.year, q = cur.quarter;
  if(!combos.has(y+'|'+q)){
    const latest = [...combos].filter(Boolean).sort().pop();
    if(latest){ const p = latest.split('|'); y = p[0]; q = p[1]; }
  }
  DEFAULTS.year = y; DEFAULTS.quarter = q;
  filters.year = new Set([y]); filters.quarter = new Set([q]);
  if(fromNetwork) periodLocked = true;
}
function quarterBounds(yl, ql){
  const y = parseInt(String(yl).replace('Y',''),10), q = parseInt(String(ql).replace('Q',''),10);
  if(!y || !q) return null;
  return { start:new Date(y,(q-1)*3,1), end:new Date(y,q*3,0,23,59,59) };
}
function quarterClock(){
  if(filters.year.size !== 1 || filters.quarter.size !== 1) return null;
  const b = quarterBounds([...filters.year][0], [...filters.quarter][0]);
  if(!b) return null;
  const now = new Date();
  if(now < b.start) return { state:'future', wk:0, left:QW, pct:0 };
  if(now > b.end) return { state:'closed', wk:QW, left:0, pct:100 };
  const days = (now-b.start)/86400000, total = (b.end-b.start)/86400000;
  const wk = clamp(Math.ceil(days/7), 1, QW);
  return { state:'live', wk, left:QW-wk, pct:clamp(days/total*100,0,100) };
}
function periodLabel(){
  const ys = [...filters.year].map(v => v.replace('Y','')).sort(), qs = [...filters.quarter].sort();
  if(ys.length === 1 && qs.length === 1) return ys[0]+' '+qs[0];
  const y = ys.length === 0 ? 'All years' : (ys.length === 1 ? ys[0] : ys.length+' years');
  const q = qs.length === 0 ? 'all quarters' : (qs.length === 1 ? qs[0] : qs.length+' quarters');
  return y+' · '+q;
}

/* ---------- data ---------- */
async function fetchView(view, params){
  const qs = new URLSearchParams(Object.assign({ view }, params||{}, { _ts:Date.now() })).toString();
  const res = await fetch(API_BASE+'?'+qs, { cache:'no-store' });
  const j = await res.json();
  if(!j.ok) throw new Error(j.error_message || j.error || 'API error');
  return j.rows;
}
function toast(m){ const t = $('toast'); t.textContent = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 9000); }
window.addEventListener('error', e => toast('Script error: '+(e.message||e.error)));
window.addEventListener('unhandledrejection', e => toast('Promise error: '+(e.reason && e.reason.message ? e.reason.message : e.reason)));
function cacheSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){ try{ localStorage.removeItem(k); localStorage.setItem(k,v); }catch(e2){} } }
async function loadData(force){
  const KEY = 'msi_target_tracking_v3';
  if(!force){
    try{
      const c = JSON.parse(localStorage.getItem(KEY) || 'null');
      if(c && c.data){ fullData = c.data; buildOptions(false); render(); stamp(c.ts, true); }
    }catch(e){}
  }
  $('btnRefresh').classList.add('busy');
  try{
    fullData = await fetchView('target_tracking', {});
    cacheSet(KEY, JSON.stringify({ data:fullData, ts:Date.now() }));
    stamp(Date.now(), false);
    buildOptions(true);
    render();
  }catch(e){ console.error(e); toast('Could not load data: '+e.message); }
  finally{ $('btnRefresh').classList.remove('busy'); }
}
function stamp(ts, cached){
  const s = new Date(ts).toLocaleString('en-GB', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
  $('stamp').textContent = (cached ? 'Cached ' : 'Updated ')+s;
  $('stamp').classList.toggle('stale', !!cached);
}
function scope(rows){
  return rows.filter(r =>
    (!filters.year.size || filters.year.has(r.year_label)) &&
    (!filters.quarter.size || filters.quarter.has(r.quarter_label)) &&
    (!filters.salesRep.size || filters.salesRep.has(r.sales_rep)) &&
    (!filters.channel.size || filters.channel.has(r.channel_type)) &&
    (!filters.series.size || filters.series.has(r.series_group)) &&
    (!filters.customer.size || filters.customer.has(r.customer)));
}
/* Order = ascending row count, so the three short sections sit on the same screen
   as the rail. Click anything, watch the others move — that is the whole point. */
const SECTIONS = [
  { k:'salesRep', label:'Sales rep',    dim:r => r.sales_rep || '—' },
  { k:'channel',  label:'Channel type', dim:r => r.channel_type || '—' },
  { k:'series',   label:'Series group', dim:r => r.series_group || '—' },
  { k:'customer', label:'Customer',     dim:r => r.customer || '—' }
];
const DIM_KEYS = ['salesRep','channel','series','customer'];
/* Cross-filter semantics: a section is scoped by every filter EXCEPT its own dimension.
   Pick Rep A and the Sales rep section still lists all reps (highlighted), while
   Channel / Series / Customer collapse onto Rep A. Self-filtering a section would
   leave it with one row and no way back. */
function scopeExcept(except){
  return fullData.filter(r =>
    (!filters.year.size || filters.year.has(r.year_label)) &&
    (!filters.quarter.size || filters.quarter.has(r.quarter_label)) &&
    (except === 'salesRep' || !filters.salesRep.size || filters.salesRep.has(r.sales_rep)) &&
    (except === 'channel'  || !filters.channel.size  || filters.channel.has(r.channel_type)) &&
    (except === 'series'   || !filters.series.size   || filters.series.has(r.series_group)) &&
    (except === 'customer' || !filters.customer.size || filters.customer.has(r.customer)));
}
function histScopeExcept(except){
  return fullData.filter(r =>
    (except === 'salesRep' || !filters.salesRep.size || filters.salesRep.has(r.sales_rep)) &&
    (except === 'channel'  || !filters.channel.size  || filters.channel.has(r.channel_type)) &&
    (except === 'series'   || !filters.series.size   || filters.series.has(r.series_group)) &&
    (except === 'customer' || !filters.customer.size || filters.customer.has(r.customer)));
}
function aggregate(rows, keyFn){
  const m = new Map();
  rows.forEach(r => {
    const k = keyFn(r);
    if(!m.has(k)) m.set(k, { key:k, target:0, actual:0, sellOut:0, linTgt:0, linAct:0, soh:0,
      avgSo:0, ly:0, dgw:0, vsc:0, spc:0, oth:0, active:false });
    const g = m.get(k);
    g.target += numOr0(r.dealers_target); g.actual += numOr0(r.sell_in_actual);
    g.sellOut += numOr0(r.sell_out_actual); g.linTgt += numOr0(r.linearity_target);
    g.linAct += numOr0(r.sell_in_linearity_actual); g.soh += numOr0(r.dealers_soh);
    g.avgSo += numOr0(r.avg_sellout_per_week); g.ly += numOr0(r.sell_in_last_year);
    g.dgw += numOr0(r.sell_in_dgw); g.vsc += numOr0(r.sell_in_vsc);
    g.spc += numOr0(r.sell_in_spc); g.oth += numOr0(r.sell_in_others);
    if(isActiveRow(r.is_active)) g.active = true;
  });
  return [...m.values()].map(g => Object.assign(g, {
    ach: g.target > 0 ? g.actual/g.target*100 : null,
    lin: g.linTgt > 0 ? g.linAct/g.linTgt*100 : null,
    woi: g.avgSo > 0 ? g.soh/g.avgSo : null,
    yoy: g.ly > 0 ? (g.actual-g.ly)/g.ly*100 : null,
    gap: g.target > 0 ? g.target-g.actual : null
  }));
}
function totals(rows){
  const t = { sellIn:0, target:0, sellOut:0, linAct:0, linTgt:0, ly:0, soh:0, avgSo:0, dgw:0, vsc:0, spc:0, oth:0 };
  rows.forEach(r => {
    t.sellIn += numOr0(r.sell_in_actual); t.target += numOr0(r.dealers_target);
    t.sellOut += numOr0(r.sell_out_actual); t.linAct += numOr0(r.sell_in_linearity_actual);
    t.linTgt += numOr0(r.linearity_target); t.ly += numOr0(r.sell_in_last_year);
    t.soh += numOr0(r.dealers_soh); t.avgSo += numOr0(r.avg_sellout_per_week);
    t.dgw += numOr0(r.sell_in_dgw); t.vsc += numOr0(r.sell_in_vsc);
    t.spc += numOr0(r.sell_in_spc); t.oth += numOr0(r.sell_in_others);
  });
  t.ach = t.target > 0 ? t.sellIn/t.target*100 : null;
  t.lin = t.linTgt > 0 ? t.linAct/t.linTgt*100 : null;
  t.woi = t.avgSo > 0 ? t.soh/t.avgSo : null;
  t.yoy = t.ly > 0 ? (t.sellIn-t.ly)/t.ly*100 : null;
  t.gap = t.target > 0 ? t.target-t.sellIn : null;
  return t;
}
/* closed quarters carry sell_in on 53-80% of rows. below this, the source has not landed. */
const COVERAGE_FLOOR = 25;
function coverage(rows){
  if(!rows.length) return null;
  const f = rows.filter(r => numOr0(r.sell_in_actual) > 0).length;
  return { filled:f, total:rows.length, pct:f/rows.length*100 };
}

/* ---------- hand-drawn SVG. no chart library. ---------- */
/* 8 quarters, not 13 weeks: dealers_tracking_weekly returns 0 rows for the live quarter,
   quarterly sell-in is already in fullData. draw what exists. */
function sparkIndex(keyFn, except){
  const hist = histScopeExcept(except);
  const periods = [...new Set(hist.map(r => r.year_label+r.quarter_label))].sort().slice(-8);
  const idx = new Map();
  hist.forEach(r => {
    const p = r.year_label+r.quarter_label, i = periods.indexOf(p);
    if(i === -1) return;
    const k = keyFn(r);
    if(!idx.has(k)) idx.set(k, new Array(periods.length).fill(0));
    idx.get(k)[i] += numOr0(r.sell_in_actual);
  });
  return { periods, idx };
}
function spark(vals){
  if(!vals || vals.length < 2) return idle();
  const w = 66, h = 15, max = Math.max.apply(null, vals);
  if(max <= 0) return idle();
  const x = i => i/(vals.length-1)*w;
  const y = v => h - (v/max)*(h-2.5) - 1.25;
  const d = vals.map((v,i) => (i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)).join(' ');
  const lx = x(vals.length-1), ly = y(vals[vals.length-1]);
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" aria-hidden="true" style="display:block">
    <path d="${d}" fill="none" stroke="${cssVar('--ink-4')}" stroke-width="1.1" stroke-linejoin="round"/>
    <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="1.7" fill="${cssVar('--msi')}"/></svg>`;
}
function paceBar(ach, elapsed){
  if(ach === null) return idle();
  const w = 84, h = 5;
  const fw = clamp(ach,0,100)/100*w;
  const behind = elapsed !== null && (ach-elapsed) < -10;
  const col = behind ? cssVar('--msi') : cssVar('--bar');
  const tick = elapsed === null ? '' :
    `<rect x="${(clamp(elapsed,0,100)/100*w-0.5).toFixed(1)}" y="-1.5" width="1" height="${h+3}" fill="${cssVar('--ink-2')}"/>`;
  return `<svg width="${w}" height="${h+3}" viewBox="0 -1.5 ${w} ${h+3}" aria-hidden="true" style="display:block">
    <rect x="0" y="0" width="${w}" height="${h}" fill="${cssVar('--rule')}"/>
    <rect x="0" y="0" width="${fw.toFixed(1)}" height="${h}" fill="${col}"/>${tick}</svg>`;
}
function polar(cx,cy,r,f){ const a = Math.PI*(1-f); return [cx+r*Math.cos(a), cy-r*Math.sin(a)]; }
function arcD(cx,cy,r,f0,f1){
  const [x0,y0] = polar(cx,cy,r,f0), [x1,y1] = polar(cx,cy,r,f1);
  return `M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r} ${r} 0 ${(f1-f0)>0.5?1:0} 1 ${x1.toFixed(2)} ${y1.toFixed(2)}`;
}
function gauge(value, max){
  const cx = 34, cy = 30, r = 26, sw = 4;
  const f = value === null ? 0 : clamp(value/max, 0, 1);
  const col = value === null ? cssVar('--ink-4')
    : (value >= 85 ? cssVar('--pos') : value >= 70 ? cssVar('--warn') : cssVar('--msi'));
  return `<svg width="68" height="38" viewBox="0 0 68 38" role="img">
    <path d="${arcD(cx,cy,r,0,1)}" fill="none" stroke="${cssVar('--rule')}" stroke-width="${sw}"/>
    ${f > 0.005 ? `<path d="${arcD(cx,cy,r,0,f)}" fill="none" stroke="${col}" stroke-width="${sw}"/>` : ''}
    <text x="${cx}" y="${cy}" text-anchor="middle" font-family="IBM Plex Mono, monospace"
      font-size="11" font-weight="500" fill="${cssVar('--ink')}">${value === null ? '–' : value.toFixed(1)+'%'}</text>
  </svg>`;
}

/* ---------- columns ---------- */
const COLS = [
  { f:'key',    l:'',           t:'str',  cls:'name', r:(g,c) => dimTag(g, c.sec) },
  { f:'_spark', l:'8Q sell-in', t:null,   cls:'',     r:g => spark(g.spark) },
  { f:'target', l:'Target',     t:'num',  cls:'num n',r:g => fmtInt(g.target) || idle() },
  { f:'actual', l:'Sell-in',    t:'num',  cls:'num n hi', r:g => fmtInt(g.actual) || idle() },
  { f:'ach',    l:'Ach %',      t:'num',  cls:'num n',r:g => g.ach === null ? idle() : `<span class="${achCls(g.ach)}">${fmtPct(g.ach)}</span>` },
  { f:'_pace',  l:'Pace',       t:null,   cls:'',     r:(g,c) => paceBar(g.ach, c.elapsed) },
  { f:'gap',    l:'Gap',        t:'num',  cls:'num n',r:g => g.gap === null ? idle() : (g.gap > 0 ? fmtInt(g.gap) : `<span class="v-pos">${fmtInt(g.gap)}</span>`) },
  { f:'dgw',    l:'DGW',        t:'num',  cls:'num n muted', r:g => fmtInt(g.dgw) || idle() },
  { f:'vsc',    l:'VSC',        t:'num',  cls:'num n muted', r:g => fmtInt(g.vsc) || idle() },
  { f:'spc',    l:'SPC',        t:'num',  cls:'num n muted', r:g => fmtInt(g.spc) || idle() },
  { f:'oth',    l:'Oth',        t:'num',  cls:'num n muted', r:g => fmtInt(g.oth) || idle() },
  { f:'soh',    l:'SOH',        t:'num',  cls:'num n',r:g => fmtInt(g.soh) || idle() },
  { f:'woi',    l:'WOI',        t:'num',  cls:'num n',r:g => g.woi === null ? idle() : `<span class="${woiCls(g.woi)}">${fmtWoi(g.woi)}</span>` },
  { f:'yoy',    l:'YoY %',      t:'num',  cls:'num n',r:g => g.yoy === null ? idle() : `<span class="${signCls(g.yoy)}">${(g.yoy>0?'+':'')+fmtPct(g.yoy)}</span>` }
];
function dimTag(g, secKey){
  const sw = secKey === 'series' ? `<span class="swatch" style="background:${cssVar(seriesColorVar(g.key))}"></span>` : '';
  return sw + (secKey === 'series' ? seriesLabel(g.key) : g.key);
}
function sortGroups(gs){
  const col = COLS.find(c => c.f === sort.f);
  const mul = sort.d === 'asc' ? 1 : -1;
  gs.sort((a,b) => {
    if(col && col.t === 'str') return mul*String(a[sort.f]||'').localeCompare(String(b[sort.f]||''));
    const av = a[sort.f] === null || a[sort.f] === undefined ? -Infinity : a[sort.f];
    const bv = b[sort.f] === null || b[sort.f] === undefined ? -Infinity : b[sort.f];
    return mul*(av-bv);
  });
}

/* ---------- render ---------- */
function render(){
  const rows = scope(fullData);
  const t = totals(rows);
  const clock = quarterClock();
  $('period').textContent = periodLabel();
  $('week').textContent = !clock ? '' :
    clock.state === 'live' ? 'W'+clock.wk+'/'+QW+' · '+clock.left+' left'
    : clock.state === 'closed' ? 'closed' : 'not started';
  try{ renderRail(t, clock, rows); }catch(e){ console.error('rail', e); }
  try{ renderNotice(rows); }catch(e){ console.error('notice', e); }
  try{ renderLedger(clock); }catch(e){ console.error('ledger', e); toast('Render error: '+e.message); }
}
function renderRail(t, clock, rows){
  const req = (clock && clock.state === 'live' && clock.left > 0 && t.gap !== null && t.gap > 0) ? t.gap/clock.left : null;
  const cur = (clock && clock.wk > 0 && t.sellIn > 0) ? t.sellIn/clock.wk : null;
  const kpi = (k, v, s, cls) => `<div class="kpi"><div class="kpi-k">${k}</div><div class="kpi-v ${cls||''}">${v}</div><div class="kpi-s">${s||''}</div></div>`;
  $('rail').innerHTML =
    kpi('Achievement', t.ach === null ? '–' : t.ach.toFixed(1)+'%', `<span class="m">${fmtInt(t.sellIn)||0}</span> of <span class="m">${fmtInt(t.target)||0}</span>`, 'lead '+(t.ach===null?'':achCls(t.ach).replace('v-','')))
    + kpi('Gap to target', t.gap === null ? '–' : fmtInt(Math.abs(t.gap)), t.gap === null ? 'no target' : (t.gap > 0 ? 'pcs to ship' : 'pcs over'), t.gap !== null && t.gap <= 0 ? 'pos' : '')
    + kpi('Req. run-rate', req === null ? '–' : fmtInt(req), req === null ? '—' : 'pcs / week')
    + kpi('Run-rate', cur === null ? '–' : fmtInt(cur), cur === null ? '—' : 'pcs / week to date')
    + kpi('Sell out', fmtInt(t.sellOut) || '–', t.sellIn > 0 ? 'ratio <span class="m">'+(t.sellOut/t.sellIn).toFixed(2)+'</span>' : '—')
    + kpi('SOH', fmtInt(t.soh) || '–', 'pcs on hand')
    + kpi('Avg WOI', t.woi === null ? '–' : t.woi.toFixed(1), 'weeks of inventory', t.woi === null ? '' : woiCls(t.woi).replace('v-',''))
    + `<div class="rail-gauges">
        <div class="gz">${gauge(t.ach, 120)}<div class="gz-k">Achievement</div></div>
        <div class="gz">${gauge(t.lin, 150)}<div class="gz-k">Linearity</div></div>
      </div>`;
}
function renderNotice(rows){
  const c = coverage(rows);
  $('notice').innerHTML = (c && c.pct < COVERAGE_FLOOR)
    ? `<div>Sell-in has landed for only <b>${c.filled} of ${c.total}</b> rows (<b>${c.pct.toFixed(0)}%</b>) in ${periodLabel()}. Closed quarters run 53–80%. Achievement, pace and run-rate below are <b>not</b> a business result — the source has not caught up.</div>`
    : '';
}
function subRow(t, n, elapsed){
  return `<tr class="sub">
    <td>Subtotal · ${n}</td><td></td>
    <td class="num n">${fmtInt(t.target)}</td>
    <td class="num n">${fmtInt(t.sellIn)}</td>
    <td class="num n"><span class="${achCls(t.ach)}">${fmtPct(t.ach)||'–'}</span></td>
    <td>${paceBar(t.ach, elapsed)}</td>
    <td class="num n">${t.gap === null ? '' : fmtInt(t.gap)}</td>
    <td class="num n">${fmtInt(t.dgw)}</td><td class="num n">${fmtInt(t.vsc)}</td>
    <td class="num n">${fmtInt(t.spc)}</td><td class="num n">${fmtInt(t.oth)}</td>
    <td class="num n">${fmtInt(t.soh)}</td>
    <td class="num n"><span class="${woiCls(t.woi)}">${fmtWoi(t.woi)||'–'}</span></td>
    <td class="num n"><span class="${signCls(t.yoy)}">${t.yoy === null ? '–' : (t.yoy>0?'+':'')+fmtPct(t.yoy)}</span></td>
  </tr>`;
}
/* One table, four tbodies. Not four tables: a single <thead> keeps every column
   aligned down the whole page and gives one horizontal scroll instead of four. */
function renderLedger(clock){
  const elapsed = clock ? clock.pct : null;

  const colsRow = () => '<tr class="cols">'+COLS.map(c => {
    const on = sort.f === c.f;
    const ar = on ? `<span class="ar">${sort.d === 'asc' ? '↑' : '↓'}</span>` : '';
    const label = c.f === 'key' ? 'Name' : c.l;
    return `<th scope="col" class="${c.cls.indexOf('n') > -1 ? 'n' : ''} ${on?'on':''}" `
      + (c.t !== null ? `data-f="${c.f}" data-t="${c.t}"` : 'style="cursor:default"')
      + `>${label}${ar}</th>`;
  }).join('')+'</tr>';

  let body = '', periods = null;
  SECTIONS.forEach(sec => {
    const rows = scopeExcept(sec.k);
    const groups = aggregate(rows, sec.dim);
    const si = sparkIndex(sec.dim, sec.k);
    if(!periods) periods = si.periods;
    groups.forEach(g => g.spark = si.idx.get(g.key) || null);
    sortGroups(groups);
    const t = totals(rows);
    const ctx = { elapsed, sec:sec.k };
    const selN = filters[sec.k].size;
    const note = selN ? `<span class="sel-note">${selN} selected — other sections filtered</span>` : '';
    body += `<tbody data-sec="${sec.k}">`
      + `<tr class="sec"><td colspan="${COLS.length}">${sec.label}<span class="cnt">${groups.length} rows</span>${note}</td></tr>`
      + colsRow()
      + (groups.length
          ? groups.map(g => `<tr data-k="${encodeURIComponent(g.key)}" class="${filters[sec.k].has(g.key)?'on':''}">`
              + COLS.map(c => `<td class="${c.cls}">${c.r(g, ctx)}</td>`).join('')+'</tr>').join('')
            + subRow(t, groups.length, elapsed)
          : `<tr><td colspan="${COLS.length}"><div class="empty">No rows for this selection.</div></td></tr>`)
      + '</tbody>';
  });
  $('ledger').innerHTML = body;

  const inScope = scope(fullData).length;
  $('meta').textContent = periodLabel()+' · '+inScope.toLocaleString('en-US')+' of '+fullData.length.toLocaleString('en-US')+' rows'
    + (periods && periods.length ? ' · trend '+periods[0].replace('Y','')+'→'+periods[periods.length-1].replace('Y','') : '');

  $('ledger').querySelectorAll('tr.cols th[data-f]').forEach(th => th.addEventListener('click', () => {
    const f = th.dataset.f;
    if(sort.f === f) sort.d = sort.d === 'asc' ? 'desc' : 'asc';
    else { sort.f = f; sort.d = th.dataset.t === 'str' ? 'asc' : 'desc'; }
    render();
  }));
  $('ledger').querySelectorAll('tbody[data-sec]').forEach(tb => {
    const k = tb.dataset.sec;
    tb.querySelectorAll('tr[data-k]').forEach(tr => tr.addEventListener('click', () => {
      const v = decodeURIComponent(tr.dataset.k);
      if(filters[k].size === 1 && filters[k].has(v)) filters[k].clear();
      else filters[k] = new Set([v]);
      selects[k].sync();
      render();
    }));
  });
}

/* ---------- select ---------- */
class Select{
  constructor(id, key){
    this.root = $(id); this.key = key; this.opts = [];
    this.btn = this.root.querySelector('.sel-btn');
    this.val = this.root.querySelector('.v');
    this.panel = this.root.querySelector('.sel-panel');
    this.search = this.root.querySelector('.sel-search');
    this.list = this.root.querySelector('.sel-list');
    this.btn.addEventListener('click', e => { e.stopPropagation(); this.toggle(); });
    if(this.search) this.search.addEventListener('input', () => this.paint());
    document.addEventListener('click', e => { if(!this.root.contains(e.target)) this.panel.classList.remove('open'); });
  }
  toggle(){
    document.querySelectorAll('.sel-panel.open').forEach(p => { if(p !== this.panel) p.classList.remove('open'); });
    this.panel.classList.toggle('open');
    if(this.panel.classList.contains('open') && this.search) this.search.focus();
  }
  setOptions(o){ this.opts = o; this.paint(); }
  label(v){ if(this.key === 'year') return String(v).replace('Y',''); if(this.key === 'series') return seriesLabel(v); return v; }
  changed(){
    if(this.key === 'year' || this.key === 'quarter') periodTouched = true;
    this.sync(); render();
  }
  paint(){
    const q = this.search ? this.search.value.toLowerCase() : '';
    const list = this.opts.filter(o => o.toLowerCase().includes(q));
    const all = this.opts.length > 0 && this.opts.every(o => filters[this.key].has(o));
    this.list.innerHTML =
      (this.opts.length ? `<label class="sel-opt sel-all"><input type="checkbox" data-all="1" ${all?'checked':''}>All</label>` : '')
      + (list.length ? list.map(o => `<label class="sel-opt"><input type="checkbox" data-v="${encodeURIComponent(o)}" ${filters[this.key].has(o)?'checked':''}>${this.label(o)}</label>`).join('')
        : '<div class="sel-none">No matches</div>');
    const a = this.list.querySelector('[data-all]');
    if(a) a.addEventListener('change', () => {
      if(a.checked) this.opts.forEach(o => filters[this.key].add(o)); else filters[this.key].clear();
      this.paint(); this.changed();
    });
    this.list.querySelectorAll('input[data-v]').forEach(cb => cb.addEventListener('change', () => {
      const v = decodeURIComponent(cb.dataset.v);
      if(cb.checked) filters[this.key].add(v); else filters[this.key].delete(v);
      this.changed();
    }));
  }
  sync(){
    const n = filters[this.key].size;
    this.val.textContent = n === 0 ? 'All' : (n === 1 ? this.label([...filters[this.key]][0]) : n+' selected');
    this.btn.classList.toggle('on', n > 0);
    this.paint();
  }
}
const selects = {};
function buildOptions(fromNetwork){
  initDefaultPeriod(fromNetwork);
  const uniq = f => [...new Set(fullData.map(r => r[f]).filter(Boolean))].sort();
  selects.year.setOptions(uniq('year_label'));
  selects.quarter.setOptions(uniq('quarter_label'));
  selects.salesRep.setOptions(uniq('sales_rep'));
  selects.channel.setOptions(uniq('channel_type'));
  selects.series.setOptions(uniq('series_group'));
  selects.customer.setOptions(uniq('customer'));
  Object.values(selects).forEach(s => s.sync());
}
function reset(){
  periodTouched = true;
  filters.year = new Set(DEFAULTS.year ? [DEFAULTS.year] : []);
  filters.quarter = new Set(DEFAULTS.quarter ? [DEFAULTS.quarter] : []);
  filters.salesRep.clear(); filters.channel.clear(); filters.series.clear(); filters.customer.clear();
  Object.values(selects).forEach(s => s.sync());
  render();
}

/* ---------- init ---------- */
(function theme(){
  const t = localStorage.getItem('msi_theme_v3') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  $('btnTheme').textContent = t === 'dark' ? 'Light' : 'Dark';
  $('btnTheme').addEventListener('click', () => {
    const n = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', n);
    localStorage.setItem('msi_theme_v3', n);
    $('btnTheme').textContent = n === 'dark' ? 'Light' : 'Dark';
    render();   /* svg colours are baked at draw time — must redraw */
  });
})();
selects.year = new Select('selYear','year');
selects.quarter = new Select('selQuarter','quarter');
selects.salesRep = new Select('selSalesRep','salesRep');
selects.channel = new Select('selChannel','channel');
selects.series = new Select('selSeries','series');
selects.customer = new Select('selCustomer','customer');
$('btnClear').addEventListener('click', reset);
$('btnRefresh').addEventListener('click', () => loadData(true));
loadData(false);
</script>
